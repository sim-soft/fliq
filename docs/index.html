<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FLIQ — Fast, Lightweight, Independent Query Builder</title>
    <meta name="description" content="High-performance PHP Active Record / ORM for MySQL, PostgreSQL, and SQLite.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css">
    <style>
        :root {
            --sidebar-width: 280px;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    window.$docsify = {
        name: '<img src="img/simsoft.webp" alt="FLIQ" width="120"><br><small>by Simsoft</small>',
        nameLink: 'https://github.com/sim-soft',
        repo: 'https://github.com/sim-soft/fliq',
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,
        darklightTheme: {
            defaultTheme: 'light'
        },
        search: {
            placeholder: 'Search docs...',
            noData: 'No results.',
            paths: 'auto'
        },
        copyCode: {
            buttonText: 'Copy',
            successText: 'Copied!'
        },
        pagination: {
            previousText: '← Previous',
            nextText: 'Next →',
            crossChapter: true
        }
    };
</script>
<!-- Docsify core -->
<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<!-- Dark/Light toggle -->
<script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/index.min.js"></script>
<!-- Plugins -->
<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
<!-- Syntax highlighting -->
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
